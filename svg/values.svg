<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" fill="none">
  <foreignObject width="1200" height="470">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f1d13;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 4px;
  background: transparent;
}
.page > .card {
  min-height: auto;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8e9;
  border: 1px solid #533728;
  border-radius: 8px;
  box-shadow: none;
}
.section { padding: 34px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #2f1d13;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #765143; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #533728; border-radius: 6px;
  background: #fff2d7; color: #7a5d4a; font-size: 14px; font-weight: 750;
}

.values { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.value { min-height:152px; padding:20px 18px; text-align:center; border:1px solid #533728; border-radius:8px; background:#fff2d7; box-shadow:none; }
.value-icon { font-size:34px; }
.value h3 { margin:10px 0 7px; font-size:17px; }
.value p { margin:0; color:#7a5d4a; font-size:14px; line-height:1.45; }
</style>
      <div class="page" style="min-height:470px">
<section class="card section">
  <h2 class="section-title">🌱 What I Care About</h2>
  <div class="values">
    <div class="value"><div class="value-icon">🎯</div><h3>Thoughtful UI</h3><p>Giao diện rõ ràng, có chủ đích và không có chi tiết thừa.</p></div>
    <div class="value"><div class="value-icon">📱</div><h3>Responsive Design</h3><p>Hoạt động tốt trên desktop, tablet và thiết bị di động.</p></div>
    <div class="value"><div class="value-icon">♿</div><h3>Accessibility</h3><p>Trải nghiệm dễ đọc, dễ thao tác và dễ tiếp cận.</p></div>
    <div class="value"><div class="value-icon">✨</div><h3>Playful Motion</h3><p>Animation vừa đủ, tự nhiên và hỗ trợ trải nghiệm.</p></div>
    <div class="value"><div class="value-icon">🧩</div><h3>Clean Architecture</h3><p>Code dễ đọc, dễ bảo trì và thuận tiện để mở rộng.</p></div>
    <div class="value"><div class="value-icon">⚡</div><h3>Performance</h3><p>Website tải nhanh và hạn chế tài nguyên không cần thiết.</p></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>
