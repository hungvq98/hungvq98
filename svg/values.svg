<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none">
  <foreignObject width="1200" height="520">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: auto;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #caa98d; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #d8c1aa; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.values { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.value { min-height:152px; padding:20px 18px; text-align:center; border:1px solid #8f5b2e; border-radius:8px; background:#261a13; box-shadow:none; }
.value-icon { font-size:34px; }
.value h3 { margin:10px 0 7px; font-size:17px; }
.value p { margin:0; color:#d8c1aa; font-size:14px; line-height:1.45; }
</style>
      <div class="page" style="min-height:520px">
<section class="card section">
  <h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M12 10c-4 0-7-2-8-6 4 0 7 2 8 6z"/><path d="M12 10c4 0 7-2 8-6-4 0-7 2-8 6z"/></svg>What I Care About</h2>
  <div class="values">
    <div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 12l6-6"/><path d="M18 6h3v3"/></svg></div><h3>Thoughtful UI</h3><p>Giao diện rõ ràng, có chủ đích và không có chi tiết thừa.</p></div>
    <div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg></div><h3>Responsive Design</h3><p>Hoạt động tốt trên desktop, tablet và thiết bị di động.</p></div>
    <div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 7v6h5"/><path d="M9 11a6 6 0 1 0 6 8"/><path d="M17 13l2 6"/></svg></div><h3>Accessibility</h3><p>Trải nghiệm dễ đọc, dễ thao tác và dễ tiếp cận.</p></div>
    <div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3l1.5 5L19 10l-5.5 2L12 17l-1.5-5L5 10l5.5-2L12 3z"/><path d="M20 4v4"/><path d="M22 6h-4"/></svg></div><h3>Playful Motion</h3><p>Animation vừa đủ, tự nhiên và hỗ trợ trải nghiệm.</p></div>
    <div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M8 3h8v5h2a3 3 0 1 1 0 6h-2v7H8v-4H6a3 3 0 1 1 0-6h2V3z"/></svg></div><h3>Clean Architecture</h3><p>Code dễ đọc, dễ bảo trì và thuận tiện để mở rộng.</p></div>
    <div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-12h-7l1-8z"/></svg></div><h3>Performance</h3><p>Website tải nhanh và hạn chế tài nguyên không cần thiết.</p></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>
