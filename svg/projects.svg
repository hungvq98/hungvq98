<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" fill="none">
  <foreignObject width="1200" height="310">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f211b;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 22px;
  background: #f4dfc3;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8ee;
  border: 3px solid #c99564;
  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(121,72,38,.14), 0 18px 32px rgba(91,53,30,.08);
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #3b261c;
  font-size: 28px; font-weight: 850; letter-spacing: -.7px;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 2px solid #d4a06f; border-radius: 10px;
  background: #fff4e5; color: #51392c; font-size: 14px; font-weight: 750;
}

.projects { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
.project { display:grid; grid-template-columns: 210px 1fr; gap:20px; align-items:center; padding:18px; border:2px solid #d4a06f; border-radius:14px; background:#fff4e5; box-shadow:0 5px 0 rgba(121,72,38,.12); }
.project-preview { position:relative; height:150px; overflow:hidden; border:4px solid #7c5036; border-radius:13px; background:#ddbd86; }
.project-preview.travel { background: linear-gradient(145deg, transparent 48%, #547e5e 49% 65%, transparent 66%), linear-gradient(35deg, transparent 45%, #6d9472 46% 62%, transparent 63%), linear-gradient(#8fc6d0 0 52%, #5e9b7a 53% 67%, #e3bd79 68%); }
.project-preview.travel::after { content:"Wander UI"; position:absolute; left:37px; top:52px; width:125px; padding:12px 8px; text-align:center; color:#68442f; border:2px solid #b98761; border-radius:10px; background:rgba(255,247,232,.92); font-size:15px; font-weight:850; }
.project-preview.dashboard { padding:13px; background:#27313a; }
.dash-sidebar { position:absolute; left:10px; top:10px; bottom:10px; width:38px; border-radius:5px; background:#161d23; }
.dash-box { position:absolute; border-radius:5px; background:#f2e6d5; }
.dash-a { left:58px; top:14px; width:128px; height:26px; } .dash-b { left:58px; top:48px; width:57px; height:36px; } .dash-c { left:123px; top:48px; width:63px; height:36px; } .dash-d { left:58px; top:92px; width:128px; height:42px; }
.project h3 { margin:0 0 8px; font-size:23px; } .project p { margin:0; color:#624d40; font-size:14px; line-height:1.45; }
.project-tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:13px; } .project-tags span { padding:6px 9px; border:1px solid #d4a06f; border-radius:8px; color:#754727; background:#fff1dc; font-size:12px; font-weight:780; }
.project-actions { display:flex; gap:8px; margin-top:14px; } .btn { padding:8px 11px; border:2px solid #bb7649; border-radius:8px; color:#744222; background:#fff7ec; font-size:12px; font-weight:850; } .btn.primary { color:#fff; background:#c56b35; }
</style>
      <div class="page" style="min-height:310px">
<section class="card section">
  <h2 class="section-title">⭐ Featured Projects</h2>
  <div class="projects">
    <article class="project">
      <div class="project-preview travel"></div>
      <div>
        <h3>Wander UI</h3>
        <p>A cozy travel landing page with smooth scrolling, playful interactions and responsive visuals.</p>
        <div class="project-tags"><span>React</span><span>Sass</span><span>GSAP</span></div>
        <div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div>
      </div>
    </article>
    <article class="project">
      <div class="project-preview dashboard">
        <div class="dash-sidebar"></div><div class="dash-box dash-a"></div><div class="dash-box dash-b"></div><div class="dash-box dash-c"></div><div class="dash-box dash-d"></div>
      </div>
      <div>
        <h3>Dashboard Kit</h3>
        <p>A responsive dashboard template with modern components, charts and accessible interactions.</p>
        <div class="project-tags"><span>React</span><span>JavaScript</span><span>CSS</span></div>
        <div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div>
      </div>
    </article>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>