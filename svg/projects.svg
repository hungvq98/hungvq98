<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" fill="none">
  <foreignObject width="1200" height="400">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: auto;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #caa98d; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #d8c1aa; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.projects { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
.project { display:grid; grid-template-columns: 210px 1fr; gap:20px; align-items:center; padding:18px; border:1px solid #8f5b2e; border-radius:8px; background:#261a13; box-shadow:none; }
.project-preview { position:relative; height:150px; overflow:hidden; border:4px solid #7c5036; border-radius:13px; background:#ddbd86; }
.project-preview.travel { background: linear-gradient(145deg, transparent 48%, #547e5e 49% 65%, transparent 66%), linear-gradient(35deg, transparent 45%, #6d9472 46% 62%, transparent 63%), linear-gradient(#8fc6d0 0 52%, #5e9b7a 53% 67%, #e3bd79 68%); }
.project-preview.travel::after { content:"Wander UI"; position:absolute; left:37px; top:52px; width:125px; padding:12px 8px; text-align:center; color:#68442f; border:2px solid #b98761; border-radius:10px; background:rgba(255,247,232,.92); font-size:15px; font-weight:850; }
.project-preview.dashboard { padding:13px; background:#27313a; }
.dash-sidebar { position:absolute; left:10px; top:10px; bottom:10px; width:38px; border-radius:5px; background:#161d23; }
.dash-box { position:absolute; border-radius:5px; background:#f2e6d5; }
.dash-a { left:58px; top:14px; width:128px; height:26px; } .dash-b { left:58px; top:48px; width:57px; height:36px; } .dash-c { left:123px; top:48px; width:63px; height:36px; } .dash-d { left:58px; top:92px; width:128px; height:42px; }
.project h3 { margin:0 0 8px; font-size:23px; } .project p { margin:0; color:#d8c1aa; font-size:14px; line-height:1.45; }
.project-tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:13px; } .project-tags span { padding:6px 9px; border:1px solid #8f5b2e; border-radius:6px; color:#d8c1aa; background:#1b120d; font-size:12px; font-weight:780; }
.project-actions { display:flex; gap:8px; margin-top:14px; } .btn { padding:8px 11px; border:1px solid #8f5b2e; border-radius:6px; color:#fff8e9; background:#1b120d; font-size:12px; font-weight:850; } .btn.primary { color:#1b120d; border-color:#e7a15c; background:#e7a15c; }
</style>
      <div class="page" style="min-height:400px">
<section class="card section">
  <h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3z"/></svg>Featured Projects</h2>
  <div class="projects">
    <article class="project">
      <div class="project-preview travel"></div>
      <div>
        <h3>Wander UI</h3>
        <p>A cozy travel landing page with smooth scrolling, playful interactions and responsive visuals.</p>
        <div class="project-tags"><span>React</span><span>Sass</span><span>GSAP</span></div>
        <div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div>
      </div>
    </article>
    <article class="project">
      <div class="project-preview dashboard">
        <div class="dash-sidebar"></div><div class="dash-box dash-a"></div><div class="dash-box dash-b"></div><div class="dash-box dash-c"></div><div class="dash-box dash-d"></div>
      </div>
      <div>
        <h3>Dashboard Kit</h3>
        <p>A responsive dashboard template with modern components, charts and accessible interactions.</p>
        <div class="project-tags"><span>React</span><span>JavaScript</span><span>CSS</span></div>
        <div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div>
      </div>
    </article>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>
