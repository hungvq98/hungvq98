<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="255" viewBox="0 0 1200 255" fill="none">
  <foreignObject width="1200" height="255">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;family=Google+Sans+Flex:opsz,wght@6..144,1..1000&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f1d13;
  font-family: "Google Sans Flex", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8e9;
  border: 1px solid #533728;
  border-radius: 8px;
  box-shadow: none;
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #2f1d13;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", "Google Sans Flex", sans-serif;
}
.muted { color: #765143; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #533728; border-radius: 6px;
  background: #fff2d7; color: #7a5d4a; font-size: 14px; font-weight: 750;
}

.about p { margin: 0 0 14px; color:#7a5d4a; font-size:17px; line-height:1.65; }
.about p:last-child { margin-bottom:0; }
</style>
      <div class="page" style="min-height:255px">
<section class="card section about">
  <h2 class="section-title">🌿 About Me</h2>
  <p>Mình là <strong>Quốc Hùng</strong>, một Frontend Developer yêu thích việc biến ý tưởng thành những giao diện rõ ràng, thân thiện và có cá tính.</p>
  <p>Mình quan tâm đến clean code, khả năng bảo trì, responsive design và những chuyển động nhỏ giúp trải nghiệm tự nhiên hơn.</p>
  <p>Khi không code, mình thường khám phá UI animation, thiết kế cozy và các cách mới để làm giao diện trở nên sống động.</p>
</section>
</div>
    </div>
  </foreignObject>
</svg>