<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="255" viewBox="0 0 1200 255" fill="none">
  <foreignObject width="1200" height="255">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #caa98d; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #d8c1aa; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.about p { margin: 0 0 14px; color:#d8c1aa; font-size:17px; line-height:1.65; }
.about p:last-child { margin-bottom:0; }
</style>
      <div class="page" style="min-height:255px">
<section class="card section about">
  <h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="M7 20c8 0 13-5 13-13V4h-3C9 4 4 9 4 17v3h3z"/><path d="M4 20c4-4 8-7 13-10"/></svg>About Me</h2>
  <p>Mình là <strong>Quốc Hùng</strong>, một Frontend Developer yêu thích việc biến ý tưởng thành những giao diện rõ ràng, thân thiện và có cá tính.</p>
  <p>Mình quan tâm đến clean code, khả năng bảo trì, responsive design và những chuyển động nhỏ giúp trải nghiệm tự nhiên hơn.</p>
  <p>Khi không code, mình thường khám phá UI animation, thiết kế cozy và các cách mới để làm giao diện trở nên sống động.</p>
</section>
</div>
    </div>
  </foreignObject>
</svg>