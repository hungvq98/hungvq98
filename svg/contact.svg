<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f1d13;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8e9;
  border: 1px solid #533728;
  border-radius: 8px;
  box-shadow: none;
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #2f1d13;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #765143; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #533728; border-radius: 6px;
  background: #fff2d7; color: #7a5d4a; font-size: 14px; font-weight: 750;
}

.contact { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.contact-item { min-height:84px; display:flex; align-items:center; gap:14px; padding:15px 18px; border:1px solid #533728; border-radius:8px; color:#2f1d13; background:#fff2d7; box-shadow:none; text-decoration:none; }
.contact-icon { font-size:33px; }
.contact-item strong { display:block; margin-bottom:3px; font-size:15px; }
.contact-item span { color:#7a5d4a; font-size:13px; }
.footer { margin-top: 14px; color:#7a5d4a; text-align:center; font-size:14px; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title">💌 Let’s Connect</h2>
  <div class="contact">
    <a class="contact-item" href="mailto:hung.vq98@gmail.com"><span class="contact-icon">✉️</span><span><strong>Email Me</strong><span>hung.vq98@gmail.com</span></span></a>
    <a class="contact-item" href="https://facebook.com/QH.KTTT"><span class="contact-icon">🔵</span><span><strong>Facebook</strong><span>facebook.com/QH.KTTT</span></span></a>
    <a class="contact-item" href="https://github.com/hungvq98"><span class="contact-icon">🐙</span><span><strong>GitHub</strong><span>github.com/hungvq98</span></span></a>
  </div>
</section>
<div class="footer">Thanks for stopping by! Have a great day 🌼</div>
</div>
    </div>
  </foreignObject>
</svg>