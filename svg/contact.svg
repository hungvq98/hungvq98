<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f211b;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 22px;
  background: #f4dfc3;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8ee;
  border: 3px solid #c99564;
  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(121,72,38,.14), 0 18px 32px rgba(91,53,30,.08);
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #3b261c;
  font-size: 28px; font-weight: 850; letter-spacing: -.7px;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 2px solid #d4a06f; border-radius: 10px;
  background: #fff4e5; color: #51392c; font-size: 14px; font-weight: 750;
}

.contact { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.contact-item { min-height:84px; display:flex; align-items:center; gap:14px; padding:15px 18px; border:2px solid #d4a06f; border-radius:12px; color:#38261d; background:#fff4e5; box-shadow:0 4px 0 rgba(121,72,38,.12); text-decoration:none; }
.contact-icon { font-size:33px; }
.contact-item strong { display:block; margin-bottom:3px; font-size:15px; }
.contact-item span { color:#735e51; font-size:13px; }
.footer { margin-top: 14px; color:#795f50; text-align:center; font-size:14px; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title">💌 Let’s Connect</h2>
  <div class="contact">
    <a class="contact-item" href="mailto:hung.vq98@gmail.com"><span class="contact-icon">✉️</span><span><strong>Email Me</strong><span>hung.vq98@gmail.com</span></span></a>
    <a class="contact-item" href="https://facebook.com/QH.KTTT"><span class="contact-icon">🔵</span><span><strong>Facebook</strong><span>facebook.com/QH.KTTT</span></span></a>
    <a class="contact-item" href="https://github.com/hungvq98"><span class="contact-icon">🐙</span><span><strong>GitHub</strong><span>github.com/hungvq98</span></span></a>
  </div>
</section>
<div class="footer">Thanks for stopping by! Have a great day 🌼</div>
</div>
    </div>
  </foreignObject>
</svg>