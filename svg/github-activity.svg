<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f1d13;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8e9;
  border: 1px solid #533728;
  border-radius: 8px;
  box-shadow: none;
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #2f1d13;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #765143; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #533728; border-radius: 6px;
  background: #fff2d7; color: #7a5d4a; font-size: 14px; font-weight: 750;
}

.activity { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.activity-card { min-height:108px; display:flex; align-items:center; gap:15px; padding:17px; border:1px solid #533728; border-radius:8px; background:#fff2d7; box-shadow:none; }
.activity-icon { font-size:38px; }
.activity-card strong { display:block; margin-bottom:5px; font-size:15px; }
.activity-card b { display:block; margin-bottom:2px; font-size:20px; }
.activity-card span { color:#7a5d4a; font-size:13px; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title">✨ GitHub Activity</h2>
  <div class="activity">
    <div class="activity-card"><div class="activity-icon">📁</div><div><strong>Repositories</strong><b>View projects</b><span>github.com/hungvq98</span></div></div>
    <div class="activity-card"><div class="activity-icon">🐙</div><div><strong>GitHub Profile</strong><b>@hungvq98</b><span>Always building &amp; learning</span></div></div>
    <div class="activity-card"><div class="activity-icon">🎯</div><div><strong>Current Focus</strong><b>Creative frontend</b><span>React · UI Motion · UX</span></div></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>