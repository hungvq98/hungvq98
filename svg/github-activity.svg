<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #caa98d; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #d8c1aa; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.activity { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.activity-card { min-height:108px; display:flex; align-items:center; gap:15px; padding:17px; border:1px solid #8f5b2e; border-radius:8px; background:#261a13; box-shadow:none; }
.activity-icon { font-size:38px; }
.activity-card strong { display:block; margin-bottom:5px; font-size:15px; }
.activity-card b { display:block; margin-bottom:2px; font-size:20px; }
.activity-card span { color:#d8c1aa; font-size:13px; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-12h-7l1-8z"/></svg>GitHub Activity</h2>
  <div class="activity">
    <div class="activity-card"><div class="activity-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/></svg></div><div><strong>Repositories</strong><b>View projects</b><span>github.com/hungvq98</span></div></div>
    <div class="activity-card"><div class="activity-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M9 19c-5 1-5-2-7-3"/><path d="M15 22v-3.5c0-1 .3-1.8 1-2.4 3-.3 6-1.5 6-6A4.6 4.6 0 0 0 20.7 7c.1-.4.5-2-.2-4 0 0-1.3-.4-4 1.5A14 14 0 0 0 9 4.5C6.3 2.6 5 3 5 3c-.7 2-.3 3.6-.2 4A4.6 4.6 0 0 0 3.5 10c0 4.5 3 5.7 6 6 .5.4.8 1 .9 1.8V22"/></svg></div><div><strong>GitHub Profile</strong><b>@hungvq98</b><span>Always building &amp; learning</span></div></div>
    <div class="activity-card"><div class="activity-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 12l6-6"/><path d="M18 6h3v3"/></svg></div><div><strong>Current Focus</strong><b>Creative frontend</b><span>React · UI Motion · UX</span></div></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>