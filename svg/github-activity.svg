<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f211b;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 22px;
  background: #f4dfc3;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8ee;
  border: 3px solid #c99564;
  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(121,72,38,.14), 0 18px 32px rgba(91,53,30,.08);
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #3b261c;
  font-size: 28px; font-weight: 850; letter-spacing: -.7px;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 2px solid #d4a06f; border-radius: 10px;
  background: #fff4e5; color: #51392c; font-size: 14px; font-weight: 750;
}

.activity { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.activity-card { min-height:108px; display:flex; align-items:center; gap:15px; padding:17px; border:2px solid #d4a06f; border-radius:12px; background:#fff4e5; box-shadow:0 4px 0 rgba(121,72,38,.12); }
.activity-icon { font-size:38px; }
.activity-card strong { display:block; margin-bottom:5px; font-size:15px; }
.activity-card b { display:block; margin-bottom:2px; font-size:20px; }
.activity-card span { color:#705b4f; font-size:13px; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title">✨ GitHub Activity</h2>
  <div class="activity">
    <div class="activity-card"><div class="activity-icon">📁</div><div><strong>Repositories</strong><b>View projects</b><span>github.com/hungvq98</span></div></div>
    <div class="activity-card"><div class="activity-icon">🐙</div><div><strong>GitHub Profile</strong><b>@hungvq98</b><span>Always building &amp; learning</span></div></div>
    <div class="activity-card"><div class="activity-icon">🎯</div><div><strong>Current Focus</strong><b>Creative frontend</b><span>React · UI Motion · UX</span></div></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>