<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" fill="none">
  <foreignObject width="1200" height="460">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;family=Google+Sans+Flex:opsz,wght@6..144,1..1000&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #24292f;
  font-family: "Google Sans Flex", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 8px;
  box-shadow: none;
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #24292f;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", "Google Sans Flex", sans-serif;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #d0d7de; border-radius: 6px;
  background: #f6f8fa; color: #57606a; font-size: 14px; font-weight: 750;
}

.hero { min-height: 360px; display:grid; grid-template-columns: 360px 1fr; gap: 40px; align-items:center; padding:36px 42px; }
.hero::after { display:none; }
.portrait-wrap { position:relative; width:320px; height:260px; margin:0 auto; }
.window {
  position:absolute; inset:10px 12px 12px; overflow:hidden; border:1px solid #d0d7de;
  border-radius:8px; background:#f6f8fa;
  box-shadow:none;
}
.room-line { position:absolute; left:0; right:0; top:95px; height:3px; background:rgba(112,66,35,.28); }
.room-door { position:absolute; left:20px; top:75px; width:76px; height:145px; border:6px solid #7e4c2d; background:#b87442; }
.room-shelf {
  position:absolute; right:17px; top:115px; width:88px; height:95px; border:5px solid #7e4c2d;
  background: linear-gradient(#7e4c2d,#7e4c2d) 0 31px/100% 5px no-repeat,
              linear-gradient(#7e4c2d,#7e4c2d) 0 62px/100% 5px no-repeat, #a9683d;
}
.avatar-svg { position:absolute; left:42px; bottom:14px; width:230px; height:220px; filter:none; }
.plant-left, .plant-right, .plant-bottom { display:none; }
.plant-left { left:8px; top:2px; transform:rotate(-18deg); }
.plant-right { right:6px; top:5px; transform:rotate(16deg); }
.plant-bottom { right:34px; bottom:18px; font-size:34px; }
.brand { margin:0; color:#24292f; font-size:70px; line-height:1; font-weight:800; letter-spacing:0; font-family:"Baloo 2","Google Sans Flex",sans-serif; }
.name { display:flex; align-items:center; gap:10px; margin-top:14px; color:#57606a; font-size:22px; font-weight:650; }
.verified {
  display:inline-grid; place-items:center; width:23px; height:23px; border-radius:50%;
  color:#fff; background:#6ba6cf; font-size:14px; font-weight:900;
}
.role { margin:22px 0 0; color:#24292f; font-size:30px; font-weight:750; letter-spacing:0; font-family:"Baloo 2","Google Sans Flex",sans-serif; }
.tagline { max-width:620px; margin:16px 0 0; color:#57606a; font-size:17px; line-height:1.55; }
.hero-chips { display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
</style>
      <div class="page" style="min-height:460px">
<section class="card hero">
  <div class="portrait-wrap">
    <div class="plant-left">🌼</div>
    <div class="plant-right">🌿</div>
    <div class="window">
      <div class="room-line"></div>
      <div class="room-door"></div>
      <div class="room-shelf"></div>
    </div>
    <svg class="avatar-svg" viewBox="0 0 280 260" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="140" cy="238" rx="93" ry="15" fill="#6e432d" opacity=".18"/>
      <path d="M91 139c-18 14-30 45-28 81h154c3-36-10-67-29-81z" fill="#f8f7f2" stroke="#39251c" stroke-width="5"/>
      <path d="M110 151l30 26 31-26" fill="none" stroke="#c8c1b8" stroke-width="4"/>
      <path d="M102 205c-27-2-47 7-55 20 26 8 58 8 89 0" fill="#f6c096" stroke="#39251c" stroke-width="5" stroke-linecap="round"/>
      <path d="M178 205c27-2 47 7 55 20-26 8-58 8-89 0" fill="#f6c096" stroke="#39251c" stroke-width="5" stroke-linecap="round"/>
      <path d="M83 102c0-44 25-73 57-73s57 29 57 73c0 43-25 72-57 72s-57-29-57-72z" fill="#f6bd91" stroke="#39251c" stroke-width="5"/>
      <path d="M88 89c-2-31 14-66 48-70 19-3 42 5 54 20 10 13 14 31 9 52-7-18-18-28-34-36-10 11-31 19-55 17-7 7-14 12-22 17z" fill="#1e1f21" stroke="#141414" stroke-width="5"/>
      <path d="M100 47c12-24 32-34 45-34-5 8-7 14-8 22 14-15 31-20 43-18-8 7-13 13-16 19 14-4 27-1 35 4-10 4-17 8-23 14" fill="#1e1f21" stroke="#141414" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="115" cy="105" rx="12" ry="16" fill="#241711"/><ellipse cx="165" cy="105" rx="12" ry="16" fill="#241711"/>
      <circle cx="111" cy="99" r="4" fill="#fff"/><circle cx="161" cy="99" r="4" fill="#fff"/>
      <path d="M122 136c10 9 26 9 36 0" fill="none" stroke="#9e4c39" stroke-width="4" stroke-linecap="round"/>
      <path d="M140 111c-4 7-4 12 2 14" fill="none" stroke="#d88a69" stroke-width="3" stroke-linecap="round"/>
      <path d="M101 83c8-5 17-5 25-1" fill="none" stroke="#39251c" stroke-width="5" stroke-linecap="round"/>
      <path d="M154 82c8-4 17-4 25 1" fill="none" stroke="#39251c" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="plant-bottom">🪴</div>
  </div>

  <div>
    <h1 class="brand">Quhu</h1>
    <div class="name">Văn Quốc Hùng <span class="verified">✓</span></div>
    <h2 class="role">Frontend Developer</h2>
    <p class="tagline">
      I build warm, playful interfaces where thoughtful engineering
      meets character, motion and a little bit of unexpected joy.
    </p>
    <div class="hero-chips">
      <span class="pill">☕ Coffee powered</span>
      <span class="pill">✨ UI motion</span>
      <span class="pill">🌿 Based in HCMC</span>
    </div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>