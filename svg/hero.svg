<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" fill="none">
  <foreignObject width="1200" height="430">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #e0bea0; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #ead7c4; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.hero { min-height: 390px; display:grid; grid-template-columns: 1fr; align-items:center; padding:52px 56px; }
.hero::after { display:none; }
.brand { margin:0; color:#fff8e9; font-size:70px; line-height:1; font-weight:800; letter-spacing:0; font-family:"Baloo 2",sans-serif; }
.name { display:flex; align-items:center; gap:10px; margin-top:14px; color:#ead7c4; font-size:22px; font-weight:650; }
.verified {
  display:inline-grid; place-items:center; width:23px; height:23px; border-radius:50%;
  color:#1b120d; background:#7fb955; font-size:14px; font-weight:900;
}
.role { margin:22px 0 0; color:#fff8e9; font-size:30px; font-weight:750; letter-spacing:0; font-family:"Baloo 2",sans-serif; }
.tagline { max-width:620px; margin:16px 0 0; color:#ead7c4; font-size:17px; line-height:1.55; }
.hero-chips { display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
</style>
      <div class="page" style="min-height:430px">
<section class="card hero">
  <div>
    <h1 class="brand">Quhu</h1>
    <div class="name">Văn Quốc Hùng <span class="verified">✓</span></div>
    <h2 class="role">Frontend Developer</h2>
    <p class="tagline">
      I build warm, playful interfaces where thoughtful engineering
      meets character, motion and a little bit of unexpected joy.
    </p>
    <div class="hero-chips">
      <span class="pill"><svg class="icon" viewBox="0 0 24 24"><path d="M5 8h10v7a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8z"/><path d="M15 10h2a3 3 0 0 1 0 6h-2"/><path d="M6 3v2"/><path d="M10 3v2"/><path d="M14 3v2"/></svg>Coffee powered</span>
      <span class="pill"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3l1.5 5L19 10l-5.5 2L12 17l-1.5-5L5 10l5.5-2L12 3z"/><path d="M20 4v4"/><path d="M22 6h-4"/></svg>UI motion</span>
      <span class="pill"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s7-5 7-11a7 7 0 0 0-14 0c0 6 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>Based in HCMC</span>
    </div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>
