<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="230" viewBox="0 0 1200 230" fill="none">
  <foreignObject width="1200" height="230">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f211b;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 22px;
  background:
    linear-gradient(rgba(190,133,87,.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(190,133,87,.09) 1px, transparent 1px),
    #f6e4cc;
  background-size: 30px 30px;
}
.card {
  position: relative;
  overflow: hidden;
  background: rgba(255,249,239,.98);
  border: 1px solid #dfbf9b;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(91,53,30,.08);
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #3b261c;
  font-size: 28px; font-weight: 850; letter-spacing: -.7px;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #e3c5a3; border-radius: 999px;
  background: #fbefdf; color: #51392c; font-size: 14px; font-weight: 750;
}

.quote { min-height: 170px; display:grid; grid-template-columns: 76px 1fr 230px; align-items:center; padding:26px 34px; }
.quote-mark { align-self:start; color:#c56b35; font-family:Georgia, serif; font-size:88px; line-height:.9; }
.quote-text { padding-left:24px; border-left:5px solid #c56b35; font-size:31px; line-height:1.32; font-weight:900; letter-spacing:-.8px; }
.coffee-art { position:relative; height:120px; }
.cup { position:absolute; right:72px; bottom:12px; width:92px; height:62px; border:5px solid #9a613d; border-radius:10px 10px 30px 30px; background:#f2d1a7; }
.cup::before { content:""; position:absolute; right:-30px; top:11px; width:30px; height:27px; border:5px solid #9a613d; border-left:0; border-radius:0 18px 18px 0; }
.cup::after { content:"˘"; position:absolute; left:30px; top:18px; color:#75482f; font-size:26px; font-weight:900; }
.steam { position:absolute; right:104px; top:2px; color:#d49a6a; font-size:50px; }
.books { position:absolute; right:15px; bottom:0; width:118px; height:20px; border:4px solid #9a613d; border-radius:6px; background:#cf7540; box-shadow: -12px -18px 0 -2px #e6b67c, -12px -18px 0 2px #9a613d, 8px -36px 0 -2px #7d9c7a, 8px -36px 0 2px #9a613d; }
</style>
      <div class="page" style="min-height:230px">
<section class="card quote">
  <div class="quote-mark">“</div>
  <div class="quote-text">
    I turn ideas into digital spaces that feel clear, responsive and
    genuinely fun to explore.
  </div>
  <div class="coffee-art">
    <div class="steam">〰</div>
    <div class="cup"></div>
    <div class="books"></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>