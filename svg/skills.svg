<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" fill="none">
  <foreignObject width="1200" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #e0bea0; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #ead7c4; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.skills-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; }
.skill { min-height:58px; display:flex; align-items:center; gap:11px; padding:11px 13px; border:1px solid #8f5b2e; border-radius:8px; background:#261a13; box-shadow:none; font-size:15px; font-weight:780; }
.skill-icon { display:grid; place-items:center; width:34px; height:34px; padding:5px; border:1px solid #8f5b2e; border-radius:9px; background:#1b120d; color:#fff8e9; box-shadow:none; }
.skill-icon .dev-icon { display:block; width:24px; height:24px; }
.skill-fallback { color:#1b120d; background:#e7a15c; border-color:#e7a15c; font-size:12px; font-weight:900; padding:0; }
</style>
