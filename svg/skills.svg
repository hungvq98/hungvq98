<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" fill="none">
  <foreignObject width="1200" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #e0bea0; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #ead7c4; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.skills-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; }
.skill { min-height:58px; display:flex; align-items:center; gap:11px; padding:11px 13px; border:1px solid #8f5b2e; border-radius:8px; background:#261a13; box-shadow:none; font-size:15px; font-weight:780; }
.skill-icon { display:grid; place-items:center; width:32px; height:32px; border-radius:9px; color:#1b120d; font-size:14px; font-weight:950; box-shadow:0 3px 0 rgba(72,42,24,.12); }
.html { background:#e65d2f; } .css { background:#3478bf; } .sass { background:#cb6b98; }
.js { color:#2b2414; background:#f0ca36; } .react { background:#58a9ce; } .gsap { background:#458354; }
.figma { background:#e46d4d; } .ps { background:#176ca4; } .git { background:#d85d35; } .vscode { background:#3487c8; }
</style>
      <div class="page" style="min-height:240px">
<section class="card section">
  <h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M3 12h18"/></svg>Skills &amp; Tools</h2>
  <div class="skills-grid">
    <div class="skill"><span class="skill-icon html">H5</span>HTML</div>
    <div class="skill"><span class="skill-icon css">C3</span>CSS</div>
    <div class="skill"><span class="skill-icon sass">S</span>Sass</div>
    <div class="skill"><span class="skill-icon js">JS</span>JavaScript</div>
    <div class="skill"><span class="skill-icon react">⚛</span>React</div>
    <div class="skill"><span class="skill-icon gsap">G</span>GSAP</div>
    <div class="skill"><span class="skill-icon figma">F</span>Figma</div>
    <div class="skill"><span class="skill-icon ps">Ps</span>Photoshop</div>
    <div class="skill"><span class="skill-icon git">Git</span>Git</div>
    <div class="skill"><span class="skill-icon vscode">&lt;/&gt;</span>VS Code</div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>