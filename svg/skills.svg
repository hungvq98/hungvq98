<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" fill="none">
  <foreignObject width="1200" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #2f211b;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 22px;
  background: #f4dfc3;
}
.card {
  position: relative;
  overflow: hidden;
  background: #fff8ee;
  border: 3px solid #c99564;
  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(121,72,38,.14), 0 18px 32px rgba(91,53,30,.08);
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #3b261c;
  font-size: 28px; font-weight: 850; letter-spacing: -.7px;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 2px solid #d4a06f; border-radius: 10px;
  background: #fff4e5; color: #51392c; font-size: 14px; font-weight: 750;
}

.skills-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; }
.skill { min-height:58px; display:flex; align-items:center; gap:11px; padding:11px 13px; border:2px solid #d4a06f; border-radius:10px; background:#fff4e5; box-shadow:0 4px 0 rgba(121,72,38,.12); font-size:15px; font-weight:780; }
.skill-icon { display:grid; place-items:center; width:32px; height:32px; border-radius:9px; color:#fff; font-size:14px; font-weight:950; box-shadow:0 3px 0 rgba(72,42,24,.12); }
.html { background:#e65d2f; } .css { background:#3478bf; } .sass { background:#cb6b98; }
.js { color:#2b2414; background:#f0ca36; } .react { background:#58a9ce; } .gsap { background:#458354; }
.figma { background:#e46d4d; } .ps { background:#176ca4; } .git { background:#d85d35; } .vscode { background:#3487c8; }
</style>
      <div class="page" style="min-height:240px">
<section class="card section">
  <h2 class="section-title">🧰 Skills &amp; Tools</h2>
  <div class="skills-grid">
    <div class="skill"><span class="skill-icon html">H5</span>HTML</div>
    <div class="skill"><span class="skill-icon css">C3</span>CSS</div>
    <div class="skill"><span class="skill-icon sass">S</span>Sass</div>
    <div class="skill"><span class="skill-icon js">JS</span>JavaScript</div>
    <div class="skill"><span class="skill-icon react">⚛</span>React</div>
    <div class="skill"><span class="skill-icon gsap">G</span>GSAP</div>
    <div class="skill"><span class="skill-icon figma">F</span>Figma</div>
    <div class="skill"><span class="skill-icon ps">Ps</span>Photoshop</div>
    <div class="skill"><span class="skill-icon git">Git</span>Git</div>
    <div class="skill"><span class="skill-icon vscode">&lt;/&gt;</span>VS Code</div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>