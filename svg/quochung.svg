elative;height:120px}.cup{position:absolute;right:72px;bottom:12px;width:92px;height:62px;border:5px solid #9a613d;border-radius:10px 10px 30px 30px;background:#f2d1a7}.cup:before{content:"";position:absolute;right:-30px;top:11px;width:30px;height:27px;border:5px solid #9a613d;border-left:0;border-radius:0 18px 18px 0}.cup:after{content:"˘";position:absolute;left:30px;top:18px;color:#75482f;font-size:26px;font-weight:900}.steam{position:absolute;right:104px;top:2px;color:#d49a6a;font-size:50px}.books{position:absolute;right:15px;bottom:0;width:118px;height:20px;border:4px solid #9a613d;border-radius:6px;background:#cf7540;box-shadow:-12px -18px 0 -2px #e6b67c,-12px -18px 0 2px #9a613d,8px -36px 0 -2px #7d9c7a,8px -36px 0 2px #9a613d}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px}.about p{margin:0 0 14px;color:#7a5d4a;font-size:17px;line-height:1.62}.about p:last-child{margin-bottom:0}.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.skill{min-height:58px;display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid #533728;border-radius:8px;background:#fff2d7;box-shadow:none;font-size:15px;font-weight:780}.skill-icon{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;color:#fff8e9;font-size:14px;font-weight:950;box-shadow:0 3px 0 rgba(72,42,24,.12)}.html{background:#e65d2f}.css{background:#3478bf}.sass{background:#cb6b98}.js{color:#2b2414;background:#f0ca36}.react{background:#58a9ce}.gsap{background:#458354}.figma{background:#e46d4d}.ps{background:#176ca4}.git{background:#d85d35}.vscode{background:#3487c8}.facts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.fact{min-height:96px;display:flex;align-items:center;gap:14px;padding:15px 17px;border:1px solid #533728;border-radius:8px;background:#fff2d7;box-shadow:none}.fact-icon{font-size:36px}.fact strong{display:block;margin-bottom:4px;font-size:15px}.fact span{color:#7a5d4a;font-size:14px;line-height:1.35}.values{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.value{min-height:152px;padding:20px 18px;text-align:center;border:1px solid #533728;border-radius:8px;background:#fff2d7;box-shadow:none}.value-icon{font-size:34px}.value h3{margin:10px 0 7px;font-size:17px}.value p{margin:0;color:#7a5d4a;font-size:14px;line-height:1.45}.projects{display:grid;grid-template-columns:1fr 1fr;gap:18px}.project{display:grid;grid-template-columns:210px 1fr;gap:20px;align-items:center;padding:18px;border:1px solid #533728;border-radius:8px;background:#fff2d7;box-shadow:none}.project-preview{position:relative;height:150px;overflow:hidden;border:4px solid #7c5036;border-radius:13px;background:#ddbd86}.project-preview.travel{background:linear-gradient(145deg,transparent 48%,#547e5e 49% 65%,transparent 66%),linear-gradient(35deg,transparent 45%,#6d9472 46% 62%,transparent 63%),linear-gradient(#8fc6d0 0 52%,#5e9b7a 53% 67%,#e3bd79 68%)}.project-preview.travel:after{content:"Wander UI";position:absolute;left:37px;top:52px;width:125px;padding:12px 8px;text-align:center;color:#68442f;border:2px solid #b98761;border-radius:10px;background:rgba(255,247,232,.92);font-size:15px;font-weight:850}.project-preview.dashboard{padding:13px;background:#27313a}.dash-sidebar{position:absolute;left:10px;top:10px;bottom:10px;width:38px;border-radius:5px;background:#161d23}.dash-box{position:absolute;border-radius:5px;background:#f2e6d5}.dash-a{left:58px;top:14px;width:128px;height:26px}.dash-b{left:58px;top:48px;width:57px;height:36px}.dash-c{left:123px;top:48px;width:63px;height:36px}.dash-d{left:58px;top:92px;width:128px;height:42px}.project h3{margin:0 0 8px;font-size:23px}.project p{margin:0;color:#7a5d4a;font-size:14px;line-height:1.45}.project-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}.project-tags span{padding:6px 9px;border:1px solid #533728;border-radius:6px;color:#7a5d4a;background:#fff8e9;font-size:12px;font-weight:780}.project-actions{display:flex;gap:8px;margin-top:14px}.btn{padding:8px 11px;border:1px solid #533728;border-radius:6px;color:#2f1d13;background:#fff8e9;font-size:12px;font-weight:850}.btn.primary{color:#fff8e9;border-color:#bc684a;background:#bc684a}.activity{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.activity-card{min-height:108px;display:flex;align-items:center;gap:15px;padding:17px;border:1px solid #533728;border-radius:8px;background:#fff2d7;box-shadow:none}.activity-icon{font-size:38px}.activity-card strong{display:block;margin-bottom:5px;font-size:15px}.activity-card b{display:block;margin-bottom:2px;font-size:20px}.activity-card span{color:#7a5d4a;font-size:13px}.contact{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.contact-item{min-height:84px;display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid #533728;border-radius:8px;color:#2f1d13;background:#fff2d7;box-shadow:none;text-decoration:none}.contact-icon{font-size:33px}.contact-item strong{display:block;margin-bottom:3px;font-size:15px}.contact-item span{color:#7a5d4a;font-size:13px}.footer{margin-top:22px;padding:14px;color:#7a5d4a;text-align:center;font-size:14px}
