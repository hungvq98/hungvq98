ze:15px;font-weight:850}.project-preview.dashboard{padding:13px;background:#27313a}.dash-sidebar{position:absolute;left:10px;top:10px;bottom:10px;width:38px;border-radius:5px;background:#161d23}.dash-box{position:absolute;border-radius:5px;background:#f2e6d5}.dash-a{left:58px;top:14px;width:128px;height:26px}.dash-b{left:58px;top:48px;width:57px;height:36px}.dash-c{left:123px;top:48px;width:63px;height:36px}.dash-d{left:58px;top:92px;width:128px;height:42px}.project h3{margin:0 0 8px;font-size:23px}.project p{margin:0;color:#57606a;font-size:14px;line-height:1.45}.project-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}.project-tags span{padding:6px 9px;border:1px solid #d0d7de;border-radius:6px;color:#57606a;background:#ffffff;font-size:12px;font-weight:780}.project-actions{display:flex;gap:8px;margin-top:14px}.btn{padding:8px 11px;border:1px solid #d0d7de;border-radius:6px;color:#24292f;background:#ffffff;font-size:12px;font-weight:850}.btn.primary{color:#fff;border-color:#0969da;background:#0969da}.activity{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.activity-card{min-height:108px;display:flex;align-items:center;gap:15px;padding:17px;border:1px solid #d0d7de;border-radius:8px;background:#f6f8fa;box-shadow:none}.activity-icon{font-size:38px}.activity-card strong{display:block;margin-bottom:5px;font-size:15px}.activity-card b{display:block;margin-bottom:2px;font-size:20px}.activity-card span{color:#57606a;font-size:13px}.contact{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.contact-item{min-height:84px;display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid #d0d7de;border-radius:8px;color:#24292f;background:#f6f8fa;box-shadow:none;text-decoration:none}.contact-icon{font-size:33px}.contact-item strong{display:block;margin-bottom:3px;font-size:15px}.contact-item span{color:#57606a;font-size:13px}.footer{margin-top:22px;padding:14px;color:#57606a;text-align:center;font-size:14px}
