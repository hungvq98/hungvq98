      <main class="page">
        <section class="card hero"><div class="hero-copy">
            <h1 class="brand">Quhu</h1>
            <div class="name">Văn Quốc Hùng <span class="verified">✓</span></div>
            <h2 class="role">Frontend Developer</h2>
            <p class="tagline">I build warm, playful interfaces where thoughtful engineering meets character, motion and a little bit of unexpected joy.</p>
            <div class="hero-chips"><span class="chip"><svg class="icon" viewBox="0 0 24 24"><path d="M5 8h10v7a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8z"/><path d="M15 10h2a3 3 0 0 1 0 6h-2"/><path d="M6 3v2"/><path d="M10 3v2"/><path d="M14 3v2"/></svg>Coffee powered</span><span class="chip"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3l1.5 5L19 10l-5.5 2L12 17l-1.5-5L5 10l5.5-2L12 3z"/><path d="M20 4v4"/><path d="M22 6h-4"/></svg>UI motion</span><span class="chip"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s7-5 7-11a7 7 0 0 0-14 0c0 6 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>Based in HCMC</span></div>
          </div>
        </section>
        <section class="card section quote"><div class="quote-mark">“</div><div class="quote-text">I turn ideas into digital spaces that feel clear, responsive and genuinely fun to explore.</div><div class="coffee-art"><div class="steam">〰</div><div class="cup"></div><div class="books"></div></div></section>
        <div class="two-col">
          <section class="card section about"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="M7 20c8 0 13-5 13-13V4h-3C9 4 4 9 4 17v3h3z"/><path d="M4 20c4-4 8-7 13-10"/></svg>About Me</h2><p>Mình là <strong>Quốc Hùng</strong>, một Frontend Developer yêu thích việc biến ý tưởng thành những giao diện rõ ràng, thân thiện và có cá tính.</p><p>Mình quan tâm đến clean code, khả năng bảo trì, responsive design và những chuyển động nhỏ giúp trải nghiệm tự nhiên hơn.</p><p>Khi không code, mình thường khám phá UI animation, thiết kế cozy và các cách mới để làm giao diện trở nên sống động.</p></section>
          <section class="card section"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M3 12h18"/></svg>Skills &amp; Tools</h2><div class="skills-grid"><div class="skill"><span class="skill-icon html">H5</span>HTML</div><div class="skill"><span class="skill-icon css">C3</span>CSS</div><div class="skill"><span class="skill-icon sass">S</span>Sass</div><div class="skill"><span class="skill-icon js">JS</span>JavaScript</div><div class="skill"><span class="skill-icon react">⚛</span>React</div><div class="skill"><span class="skill-icon gsap">G</span>GSAP</div><div class="skill"><span class="skill-icon figma">F</span>Figma</div><div class="skill"><span class="skill-icon ps">Ps</span>Photoshop</div><div class="skill"><span class="skill-icon git">Git</span>Git</div><div class="skill"><span class="skill-icon vscode">&lt;/&gt;</span>VS Code</div></div></section>
        </div>
        <section class="card section"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v5h1"/></svg>Quick Facts</h2><div class="facts"><div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s7-5 7-11a7 7 0 0 0-14 0c0 6 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></div><div><strong>Based in</strong><span>Ho Chi Minh City</span></div></div><div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="11" rx="1"/><path d="M8 20h8"/><path d="M12 16v4"/></svg></div><div><strong>Role</strong><span>Frontend Developer</span></div></div><div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5v14"/><path d="M17 5v14"/><path d="M3 9h18"/><path d="M3 15h18"/></svg></div><div><strong>Loves</strong><span>UI motion</span></div></div><div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M5 8h10v7a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8z"/><path d="M15 10h2a3 3 0 0 1 0 6h-2"/><path d="M6 3v2"/><path d="M10 3v2"/><path d="M14 3v2"/></svg></div><div><strong>Powered by</strong><span>Coffee</span></div></div></div></section>
        <section class="card section"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M12 10c-4 0-7-2-8-6 4 0 7 2 8 6z"/><path d="M12 10c4 0 7-2 8-6-4 0-7 2-8 6z"/></svg>What I Care About</h2><div class="values"><div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 12l6-6"/><path d="M18 6h3v3"/></svg></div><h3>Thoughtful UI</h3><p>Giao diện rõ ràng, có chủ đích và không có chi tiết thừa.</p></div><div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg></div><h3>Responsive Design</h3><p>Hoạt động tốt trên desktop, tablet và thiết bị di động.</p></div><div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 7v6h5"/><path d="M9 11a6 6 0 1 0 6 8"/><path d="M17 13l2 6"/></svg></div><h3>Accessibility</h3><p>Trải nghiệm dễ đọc, dễ thao tác và dễ tiếp cận.</p></div><div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3l1.5 5L19 10l-5.5 2L12 17l-1.5-5L5 10l5.5-2L12 3z"/><path d="M20 4v4"/><path d="M22 6h-4"/></svg></div><h3>Playful Motion</h3><p>Animation vừa đủ, tự nhiên và hỗ trợ trải nghiệm.</p></div><div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M8 3h8v5h2a3 3 0 1 1 0 6h-2v7H8v-4H6a3 3 0 1 1 0-6h2V3z"/></svg></div><h3>Clean Architecture</h3><p>Code dễ đọc, dễ bảo trì và thuận tiện để mở rộng.</p></div><div class="value"><div class="value-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-12h-7l1-8z"/></svg></div><h3>Performance</h3><p>Website tải nhanh và hạn chế tài nguyên không cần thiết.</p></div></div></section>
        <section class="card section"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3z"/></svg>Featured Projects</h2><div class="projects"><article class="project"><div class="project-preview travel"></div><div><h3>Wander UI</h3><p>A cozy travel landing page with smooth scrolling, playful interactions and responsive visuals.</p><div class="project-tags"><span>React</span><span>Sass</span><span>GSAP</span></div><div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div></div></article><article class="project"><div class="project-preview dashboard"><div class="dash-sidebar"></div><div class="dash-box dash-a"></div><div class="dash-box dash-b"></div><div class="dash-box dash-c"></div><div class="dash-box dash-d"></div></div><div><h3>Dashboard Kit</h3><p>A responsive dashboard template with modern components, charts and accessible interactions.</p><div class="project-tags"><span>React</span><span>JavaScript</span><span>CSS</span></div><div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div></div></article></div></section>
        <section class="card section"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-12h-7l1-8z"/></svg>GitHub Activity</h2><div class="activity"><div class="activity-card"><div class="activity-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/></svg></div><div><strong>Repositories</strong><b>View projects</b><span>github.com/hungvq98</span></div></div><div class="activity-card"><div class="activity-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M9 19c-5 1-5-2-7-3"/><path d="M15 22v-3.5c0-1 .3-1.8 1-2.4 3-.3 6-1.5 6-6A4.6 4.6 0 0 0 20.7 7c.1-.4.5-2-.2-4 0 0-1.3-.4-4 1.5A14 14 0 0 0 9 4.5C6.3 2.6 5 3 5 3c-.7 2-.3 3.6-.2 4A4.6 4.6 0 0 0 3.5 10c0 4.5 3 5.7 6 6 .5.4.8 1 .9 1.8V22"/></svg></div><div><strong>GitHub Profile</strong><b>@hungvq98</b><span>Always building &amp; learning</span></div></div><div class="activity-card"><div class="activity-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 12l6-6"/><path d="M18 6h3v3"/></svg></div><div><strong>Current Focus</strong><b>Creative frontend</b><span>React · UI Motion · UX</span></div></div></div></section>
        <section class="card section"><h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>Let’s Connect</h2><div class="contact"><a class="contact-item" href="mailto:hung.vq98@gmail.com"><span class="contact-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg></span><span><strong>Email Me</strong><span>hung.vq98@gmail.com</span></span></a><a class="contact-item" href="https://facebook.com/QH.KTTT"><span class="contact-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M14 8h-2a2 2 0 0 0-2 2v2H8v3h2v5h3v-5h2.5l.5-3h-3v-1.5c0-.8.4-1.5 1.5-1.5H16V8h-2z"/></svg></span><span><strong>Facebook</strong><span>facebook.com/QH.KTTT</span></span></a><a class="contact-item" href="https://github.com/hungvq98"><span class="contact-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M9 19c-5 1-5-2-7-3"/><path d="M15 22v-3.5c0-1 .3-1.8 1-2.4 3-.3 6-1.5 6-6A4.6 4.6 0 0 0 20.7 7c.1-.4.5-2-.2-4 0 0-1.3-.4-4 1.5A14 14 0 0 0 9 4.5C6.3 2.6 5 3 5 3c-.7 2-.3 3.6-.2 4A4.6 4.6 0 0 0 3.5 10c0 4.5 3 5.7 6 6 .5.4.8 1 .9 1.8V22"/></svg></span><span><strong>GitHub</strong><span>github.com/hungvq98</span></span></a></div></section>
