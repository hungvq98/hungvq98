        </section>
        <section class="card section quote"><div class="quote-mark">“</div><div class="quote-text">I turn ideas into digital spaces that feel clear, responsive and genuinely fun to explore.</div><div class="coffee-art"><div class="steam">〰</div><div class="cup"></div><div class="books"></div></div></section>
        <div class="two-col">
          <section class="card section about"><h2 class="section-title">🌿 About Me</h2><p>Mình là <strong>Quốc Hùng</strong>, một Frontend Developer yêu thích việc biến ý tưởng thành những giao diện rõ ràng, thân thiện và có cá tính.</p><p>Mình quan tâm đến clean code, khả năng bảo trì, responsive design và những chuyển động nhỏ giúp trải nghiệm tự nhiên hơn.</p><p>Khi không code, mình thường khám phá UI animation, thiết kế cozy và các cách mới để làm giao diện trở nên sống động.</p></section>
          <section class="card section"><h2 class="section-title">🧰 Skills &amp; Tools</h2><div class="skills-grid"><div class="skill"><span class="skill-icon html">H5</span>HTML</div><div class="skill"><span class="skill-icon css">C3</span>CSS</div><div class="skill"><span class="skill-icon sass">S</span>Sass</div><div class="skill"><span class="skill-icon js">JS</span>JavaScript</div><div class="skill"><span class="skill-icon react">⚛</span>React</div><div class="skill"><span class="skill-icon gsap">G</span>GSAP</div><div class="skill"><span class="skill-icon figma">F</span>Figma</div><div class="skill"><span class="skill-icon ps">Ps</span>Photoshop</div><div class="skill"><span class="skill-icon git">Git</span>Git</div><div class="skill"><span class="skill-icon vscode">&lt;/&gt;</span>VS Code</div></div></section>
        </div>
        <section class="card section"><h2 class="section-title">🌼 Quick Facts</h2><div class="facts"><div class="fact"><div class="fact-icon">📍</div><div><strong>Based in</strong><span>Ho Chi Minh City</span></div></div><div class="fact"><div class="fact-icon">💻</div><div><strong>Role</strong><span>Frontend Developer</span></div></div><div class="fact"><div class="fact-icon">🎬</div><div><strong>Loves</strong><span>UI motion</span></div></div><div class="fact"><div class="fact-icon">☕</div><div><strong>Powered by</strong><span>Coffee</span></div></div></div></section>
        <section class="card section"><h2 class="section-title">🌱 What I Care About</h2><div class="values"><div class="value"><div class="value-icon">🎯</div><h3>Thoughtful UI</h3><p>Giao diện rõ ràng, có chủ đích và không có chi tiết thừa.</p></div><div class="value"><div class="value-icon">📱</div><h3>Responsive Design</h3><p>Hoạt động tốt trên desktop, tablet và thiết bị di động.</p></div><div class="value"><div class="value-icon">♿</div><h3>Accessibility</h3><p>Trải nghiệm dễ đọc, dễ thao tác và dễ tiếp cận.</p></div><div class="value"><div class="value-icon">✨</div><h3>Playful Motion</h3><p>Animation vừa đủ, tự nhiên và hỗ trợ trải nghiệm.</p></div><div class="value"><div class="value-icon">🧩</div><h3>Clean Architecture</h3><p>Code dễ đọc, dễ bảo trì và thuận tiện để mở rộng.</p></div><div class="value"><div class="value-icon">⚡</div><h3>Performance</h3><p>Website tải nhanh và hạn chế tài nguyên không cần thiết.</p></div></div></section>
        <section class="card section"><h2 class="section-title">⭐ Featured Projects</h2><div class="projects"><article class="project"><div class="project-preview travel"></div><div><h3>Wander UI</h3><p>A cozy travel landing page with smooth scrolling, playful interactions and responsive visuals.</p><div class="project-tags"><span>React</span><span>Sass</span><span>GSAP</span></div><div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div></div></article><article class="project"><div class="project-preview dashboard"><div class="dash-sidebar"></div><div class="dash-box dash-a"></div><div class="dash-box dash-b"></div><div class="dash-box dash-c"></div><div class="dash-box dash-d"></div></div><div><h3>Dashboard Kit</h3><p>A responsive dashboard template with modern components, charts and accessible interactions.</p><div class="project-tags"><span>React</span><span>JavaScript</span><span>CSS</span></div><div class="project-actions"><span class="btn primary">Live Demo ↗</span><span class="btn">Source Code</span></div></div></article></div></section>
        <section class="card section"><h2 class="section-title">✨ GitHub Activity</h2><div class="activity"><div class="activity-card"><div class="activity-icon">📁</div><div><strong>Repositories</strong><b>View projects</b><span>github.com/hungvq98</span></div></div><div class="activity-card"><div class="activity-icon">🐙</div><div><strong>GitHub Profile</strong><b>@hungvq98</b><span>Always building &amp; learning</span></div></div><div class="activity-card"><div class="activity-icon">🎯</div><div><strong>Current Focus</strong><b>Creative frontend</b><span>React · UI Motion · UX</span></div></div></div></section>
