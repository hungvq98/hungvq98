<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #24292f;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 8px;
  box-shadow: none;
}
.section { padding: 28px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #24292f;
  font-size: 22px; font-weight: 700; letter-spacing: 0;
}
.muted { color: #7a6558; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: 1px solid #d0d7de; border-radius: 6px;
  background: #f6f8fa; color: #57606a; font-size: 14px; font-weight: 750;
}

.facts { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
.fact { min-height:96px; display:flex; align-items:center; gap:14px; padding:15px 17px; border:1px solid #d0d7de; border-radius:8px; background:#f6f8fa; box-shadow:none; }
.fact-icon { font-size:36px; }
.fact strong { display:block; margin-bottom:4px; font-size:15px; }
.fact span { color:#57606a; font-size:14px; line-height:1.35; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title">🌼 Quick Facts</h2>
  <div class="facts">
    <div class="fact"><div class="fact-icon">📍</div><div><strong>Based in</strong><span>Ho Chi Minh City</span></div></div>
    <div class="fact"><div class="fact-icon">💻</div><div><strong>Role</strong><span>Frontend Developer</span></div></div>
    <div class="fact"><div class="fact-icon">🎬</div><div><strong>Loves</strong><span>UI motion</span></div></div>
    <div class="fact"><div class="fact-icon">☕</div><div><strong>Powered by</strong><span>Coffee</span></div></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>