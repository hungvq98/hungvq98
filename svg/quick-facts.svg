<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none">
  <foreignObject width="1200" height="220">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&amp;display=swap');
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 1200px;
  color: #fff8e9;
  font-family: "Baloo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
}
.page {
  width: 1200px;
  padding: 0;
  background: transparent;
}
.page > .card {
  min-height: inherit;
}
.card {
  position: relative;
  overflow: hidden;
  background: #1b120d;
  border: 1px solid #8f5b2e;
  border-radius: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,248,233,.04);
}
.section { padding: 24px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 18px; color: #fff8e9;
  font-size: 22px; font-weight: 700; letter-spacing: 0; font-family: "Baloo 2", sans-serif;
}
.muted { color: #e0bea0; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1px solid #8f5b2e; border-radius: 6px;
  background: #261a13; color: #ead7c4; font-size: 14px; font-weight: 750;
}
.icon { width:24px; height:24px; flex:0 0 auto; color:#e7a15c; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.pill .icon { width:16px; height:16px; }
.value-icon, .fact-icon, .activity-icon, .contact-icon { display:grid; place-items:center; color:#e7a15c; }
.value-icon .icon, .fact-icon .icon, .activity-icon .icon, .contact-icon .icon { width:34px; height:34px; }

.facts { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
.fact { min-height:96px; display:flex; align-items:center; gap:14px; padding:15px 17px; border:1px solid #8f5b2e; border-radius:8px; background:#261a13; box-shadow:none; }
.fact-icon { font-size:36px; }
.fact strong { display:block; margin-bottom:4px; color:#fff8e9; font-size:15px; }
.fact span { color:#ead7c4; font-size:14px; line-height:1.35; }
</style>
      <div class="page" style="min-height:220px">
<section class="card section">
  <h2 class="section-title"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v5h1"/></svg>Quick Facts</h2>
  <div class="facts">
    <div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s7-5 7-11a7 7 0 0 0-14 0c0 6 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></div><div><strong>Based in</strong><span>Ho Chi Minh City</span></div></div>
    <div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="11" rx="1"/><path d="M8 20h8"/><path d="M12 16v4"/></svg></div><div><strong>Role</strong><span>Frontend Developer</span></div></div>
    <div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5v14"/><path d="M17 5v14"/><path d="M3 9h18"/><path d="M3 15h18"/></svg></div><div><strong>Loves</strong><span>UI motion</span></div></div>
    <div class="fact"><div class="fact-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M5 8h10v7a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8z"/><path d="M15 10h2a3 3 0 0 1 0 6h-2"/><path d="M6 3v2"/><path d="M10 3v2"/><path d="M14 3v2"/></svg></div><div><strong>Powered by</strong><span>Coffee</span></div></div>
  </div>
</section>
</div>
    </div>
  </foreignObject>
</svg>